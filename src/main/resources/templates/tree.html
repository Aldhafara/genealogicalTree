<!DOCTYPE html>
<html lang="en-EN" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Index</title>

        <th:block th:replace="~{common/fragments :: headResources}"></th:block>

        <link rel="stylesheet" th:href="@{/css/tree.css}">
        <script src="https://d3js.org/d3.v7.min.js" defer></script>
        <script th:src="@{/js/tree.js}" defer></script>
    </head>
    <body class="main-background">
        <header th:replace="~{common/fragments :: header}"></header>

        <div class="content justify-content-center">
            <div class="tree-container justify-content-center">
                <div id="tree" th:data-initial-id="${initialUuid}"></div>
            </div>
        </div>

        <footer th:replace="~{common/fragments :: footer}"></footer>
    </body>
</html>
