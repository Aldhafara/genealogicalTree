<!DOCTYPE HTML>
<html lang="en-EN" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <th:block th:replace="~{common/fragments :: headResources}"></th:block>
        <title data-i18n="login">Login</title>
    </head>
    <body class="main-background">
        <header th:replace="~{common/fragments :: header}"></header>

        <h1 data-i18n="login">Login</h1>

        <form th:action="@{/login}" class="col-sm-6" method="post">
            <div class="row mb-3">
                <label for="username" class="col-sm-2 col-form-label">Login:</label>
                <div class="col-sm-10">
                    <input type="text"
                           id="username"
                           class="form-control"
                           name="username"
                           autocomplete="username">
                </div>
            </div>

            <div class="row mb-3">
                <label for="password" class="col-sm-2 col-form-label" data-i18n="password">
                    Password:
                </label>

                <div class="col-sm-10">
                    <div class="input-group">
                        <input type="password"
                               class="form-control"
                               id="password"
                               name="password"
                               placeholder="Password"
                               autocomplete="current-password"
                               autocapitalize="off"
                               autocorrect="off"
                               spellcheck="false">

                        <button type="button"
                                class="input-group-text toggle-password"
                                data-target="password"
                                th:data-eye-open="@{/svg/eye-open-svgrepo-com.svg}"
                                th:data-eye-closed="@{/svg/eye-closed-svgrepo-com.svg}"
                                aria-label="Show password"
                                aria-pressed="false"
                                title="Press and hold to show password">
                            <img th:src="@{/svg/eye-open-svgrepo-com.svg}"
                                 alt=""
                                 width="20"
                                 height="20"
                                 aria-hidden="true">
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-primary btn-lg" type="submit" data-i18n="login">Login</button>
            </div>
        </form>

        <footer th:replace="~{common/fragments :: footer}"></footer>
        <script th:src="@{/js/password-toggle.js}"></script>
    </body>
</html>
