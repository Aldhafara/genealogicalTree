<!DOCTYPE HTML>
<html lang="en-EN" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <th:block th:replace="~{common/fragments :: headResources}"></th:block>
        <title data-i18n="login">Login</title>
    </head>
    <body class="main-background">
        <header th:replace="~{common/fragments :: header}"></header>

        <h1>Login</h1>
        <form th:action="@{/login}" class="col-sm-6" method="post">
            <div class="row mb-3">
                <label for="username" class="col-sm-2 col-form-label">Login:</label>
                <div class="col-sm-10">
                    <input type="text" id="username" class="form-control" name="username">
                </div>
            </div>
            <div class="row mb-3">
                <label for="password" class="col-sm-2 col-form-label" data-i18n="password">Password:</label>
                <div class="col-sm-10">
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Password">
                        <span class="input-group-text" id="togglePassword" style="cursor: pointer; user-select: none;"
                              title="Press and hold to show password">
                            👁️
                        </span>
                    </div>
                </div>
            </div>

            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const togglePassword = document.querySelector('#togglePassword');
                    const passwordInput = document.querySelector('#password');

                    togglePassword.addEventListener('mousedown', () => {
                        passwordInput.setAttribute('type', 'text');
                    });

                    togglePassword.addEventListener('mouseup', () => {
                        passwordInput.setAttribute('type', 'password');
                    });

                    togglePassword.addEventListener('mouseleave', (event) => {
                        if (event.buttons === 1) {
                            passwordInput.setAttribute('type', 'password');
                        }
                    });
                });
            </script>
            <div>
                <br>
                <button class="btn btn-primary btn-lg" type="submit" data-i18n="login">Login</button>
            </div>
        </form>

        <footer th:replace="~{common/fragments :: footer}"></footer>
    </body>
</html>
