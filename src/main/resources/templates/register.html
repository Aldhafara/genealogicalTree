<!DOCTYPE HTML>
<html lang="en-EN" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <th:block th:replace="~{common/fragments :: headResources}"></th:block>
        <title data-i18n="register">Register</title>
    </head>
    <body class="main-background">
        <header th:replace="~{common/fragments :: header}"></header>

        <div class="container-fluid px-3 px-md-4">
            <div class="row justify-content-center justify-content-lg-start">
                <div class="col-12 col-lg-6">
                    <h1 class="text-center text-lg-left" data-i18n="register">Register</h1>

                    <form th:action="@{/register}"
                          th:object="${registrationRequest}"
                          method="post"
                          oninput='retypePassword.setCustomValidity(retypePassword.value !== password.value ? "Passwords do not match." : "")'>

                        <div class="alert alert-danger"
                             th:if="${#fields.hasGlobalErrors()}">
                            <p th:each="err : ${#fields.globalErrors()}"
                               th:text="${err}"></p>
                        </div>

                        <div class="mb-3 required-field">
                            <label for="firstName" class="form-label" data-i18n="firstName">First name:</label>
                            <input required
                                   type="text"
                                   id="firstName"
                                   class="form-control"
                                   th:field="*{personDetails.firstName}"
                                   th:classappend="${#fields.hasErrors('personDetails.firstName')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('personDetails.firstName')}"
                                 th:errors="*{personDetails.firstName}"></div>
                        </div>

                        <div class="mb-3 required-field">
                            <label for="lastName" class="form-label" data-i18n="lastName">Last name:</label>
                            <input required
                                   type="text"
                                   id="lastName"
                                   class="form-control"
                                   th:field="*{personDetails.lastName}"
                                   th:classappend="${#fields.hasErrors('personDetails.lastName')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('personDetails.lastName')}"
                                 th:errors="*{personDetails.lastName}"></div>
                        </div>

                        <div class="mb-3 required-field">
                            <label for="sex" class="form-label" data-i18n="sex">Sex</label>
                            <select class="form-control"
                                    id="sex"
                                    required
                                    th:field="*{personDetails.sex}"
                                    th:classappend="${#fields.hasErrors('personDetails.sex')} ? ' is-invalid' : ''">
                                <option value="" data-i18n="choose">Choose...</option>
                                <option th:each="option : ${sexOptions}"
                                        th:value="${option}"
                                        th:text="${option.getAlternativeName()}"></option>
                            </select>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('personDetails.sex')}"
                                 th:errors="*{personDetails.sex}"></div>
                        </div>

                        <div class="mb-3 required-field">
                            <label for="login" class="form-label">Login:</label>
                            <input id="login"
                                   placeholder="Enter Login"
                                   required
                                   type="text"
                                   class="form-control"
                                   th:field="*{registerUser.login}"
                                   th:classappend="${#fields.hasErrors('registerUser.login')} ? ' is-invalid' : ''"/>

                            <div class="invalid-feedback d-block"
                                 th:if="${#fields.hasErrors('registerUser.login')}"
                                 th:errors="*{registerUser.login}"></div>

                            <div class="invalid-feedback d-block"
                                 th:if="${loginError != null}"
                                 th:text="${loginError}"></div>
                        </div>

                        <div class="mb-3 required-field">
                            <label for="password" class="form-label" data-i18n="password">Password:</label>
                            <div class="input-group">
                                <input required
                                       type="password"
                                       id="password"
                                       class="form-control"
                                       th:field="*{registerUser.password}"
                                       th:classappend="${#fields.hasErrors('registerUser.password')} ? ' is-invalid' : ''"
                                       placeholder="Password"
                                       autocomplete="new-password"
                                       autocapitalize="off"
                                       autocorrect="off"
                                       spellcheck="false">

                                <button type="button"
                                        class="input-group-text toggle-password"
                                        data-target="password"
                                        th:data-eye-open="@{/svg/eye-open-svgrepo-com.svg}"
                                        th:data-eye-closed="@{/svg/eye-closed-svgrepo-com.svg}"
                                        aria-label="Show password"
                                        aria-pressed="false"
                                        title="Press and hold to show password">
                                    <img th:src="@{/svg/eye-open-svgrepo-com.svg}"
                                         alt=""
                                         width="20"
                                         height="20"
                                         aria-hidden="true">
                                </button>
                            </div>
                            <div class="invalid-feedback d-block"
                                 th:if="${#fields.hasErrors('registerUser.password')}"
                                 th:errors="*{registerUser.password}"></div>
                        </div>

                        <div class="mb-3 required-field">
                            <label for="retypePassword" class="form-label" data-i18n="repeatPassword">
                                Repeat password:
                            </label>
                            <div class="input-group">
                                <input required
                                       type="password"
                                       id="retypePassword"
                                       class="form-control"
                                       name="retypePassword"
                                       placeholder="Retype password"
                                       autocomplete="new-password"
                                       autocapitalize="off"
                                       autocorrect="off"
                                       spellcheck="false">

                                <button type="button"
                                        class="input-group-text toggle-password"
                                        data-target="retypePassword"
                                        th:data-eye-open="@{/svg/eye-open-svgrepo-com.svg}"
                                        th:data-eye-closed="@{/svg/eye-closed-svgrepo-com.svg}"
                                        aria-label="Show password"
                                        aria-pressed="false"
                                        title="Press and hold to show password">
                                    <img th:src="@{/svg/eye-open-svgrepo-com.svg}"
                                         alt=""
                                         width="20"
                                         height="20"
                                         aria-hidden="true">
                                </button>
                            </div>
                        </div>

                        <div class="mt-3">
                            <button class="btn btn-primary btn-lg w-100 w-md-auto"
                                    type="submit"
                                    data-i18n="register">
                                Register
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <footer th:replace="~{common/fragments :: footer}"></footer>
        <script th:src="@{/js/password-toggle.js}"></script>
    </body>
</html>
