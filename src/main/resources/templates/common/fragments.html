<th:block xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <th:block th:fragment="headResources">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
              integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
              crossorigin="anonymous">
        <link rel="stylesheet" th:href="@{/css/style.css}">

        <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
                integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
                crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
                integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGaOFOA/4rGkFUOdJGZ8dMUZ"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
                integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
                crossorigin="anonymous"></script>
        <script th:src="@{/js/localization.js}" defer></script>
    </th:block>

    <header th:fragment="header">
        <div class="container-fluid px-3 px-md-4">
            <h1 class="text-center text-lg-left" id="page-title" data-i18n="title">
                My Genealogical Tree
            </h1>

            <div class="d-flex justify-content-between align-items-center w-100 py-2">
                <div class="d-flex gap-2">
                    <nav class="d-flex flex-wrap justify-content-center justify-content-lg-start py-2">
                        <a th:href="@{/}" sec:authorize="!isAuthenticated()" class="btn btn-nav mr-2 mb-2" role="button"
                           data-i18n="mainPage">Main page</a>
                        <a th:href="@{/home}" sec:authorize="isAuthenticated()" class="btn btn-nav mr-2 mb-2"
                           role="button"
                           data-i18n="mainPage">Main page</a>
                        <a th:href="@{/login}" sec:authorize="!isAuthenticated()" class="btn btn-nav mr-2 mb-2"
                           role="button"
                           data-i18n="login">Log in</a>
                        <a th:href="@{/register}" sec:authorize="!isAuthenticated()" class="btn btn-nav mr-2 mb-2"
                           role="button"
                           data-i18n="register">Register</a>
                        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="mb-2 mr-2">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-nav" data-i18n="logout">Log out</button>
                        </form>
                    </nav>
                </div>

                <div class="d-flex flex-wrap justify-content-center justify-content-lg-end py-2 language-buttons">
                    <button type="button"
                            class="btn btn-language btn-sm mb-2 mx-1"
                            onclick="changeLanguage('en-EN')">
                        English
                    </button>
                    <button type="button"
                            class="btn btn-language btn-sm mb-2 mx-1"
                            onclick="changeLanguage('pl-PL')">
                        Polski
                    </button>
                </div>
            </div>
        </div>
    </header>

    <footer th:fragment="footer">
        <div class="container-fluid px-3 px-md-4 py-3">
            <p class="mb-0">&copy; 2026 Aldhafara company</p>
        </div>
    </footer>

</th:block>
